services:
  plaspart:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - PLASMIDFINDER_DB_PATH=/home/appuser/app/db/plasmidfinder/database
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/home/appuser/app/models:ro
      - ./localDB:/home/appuser/app/localDB:ro
      - ./uploads:/home/appuser/app/uploads
      - ./logs:/home/appuser/app/logs
    environment:
      - FLASK_ENV=production
      - PLASMIDFINDER_DB_PATH=/home/appuser/app/localDB
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    stdin_open: true
    tty: true
